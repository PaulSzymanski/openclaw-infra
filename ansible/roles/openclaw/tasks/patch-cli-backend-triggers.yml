---
# Patch Anthropic content-based billing triggers in OpenClaw system prompts.
#
# Anthropic's API classifies certain phrases in system prompts as third-party
# automation and rejects requests with a billing error. The claude-cli backend
# shells out to `claude -p` which uses the Max subscription, but Anthropic's
# server-side classifier still scans the prompt content.
#
# Three trigger phrases identified via binary search (2026-04-09):
#   1. "support depends on the current channel config" — Reply Tags section
#   2. "HEARTBEAT_OK" as heartbeat ack instruction — Heartbeats section
#   3. "openclaw.inbound_meta.v1" — Telegram inbound metadata schema
#
# Patches use content-based grep (not filenames) so they survive minification
# renames across OpenClaw versions. String literals are never rewritten by
# JS minifiers.
#
# Remove when OpenClaw rewrites these strings upstream.

- name: "CLI trigger patch: apply and verify"
  ansible.builtin.shell: |
    {% raw %}
    set -euo pipefail
    DIST="/home/ubuntu/.npm-global/lib/node_modules/openclaw/dist"
    CHANGED=0

    patch_trigger() {
      local pattern="$1" sed_cmd="$2" label="$3"
      local files
      files=$(grep -rl "$pattern" "$DIST" --include='*.js' 2>/dev/null || true)
      [ -z "$files" ] && return 0
      while IFS= read -r f; do
        sed -i "$sed_cmd" "$f"
        if grep -q "$pattern" "$f"; then
          echo "FAIL: $label still present in $f after sed"
          return 1
        fi
        echo "$label: patched $f"
      done <<< "$files"
      CHANGED=1
    }

    patch_trigger \
      'support depends on the current channel config' \
      's/"Tags are stripped before sending; support depends on the current channel config\.",//' \
      T1

    patch_trigger \
      'HEARTBEAT_OK.*heartbeat ack' \
      's|OpenClaw treats a leading/trailing \\"HEARTBEAT_OK\\" as a heartbeat ack (and may discard it)\.|Leading or trailing keepalive acknowledgments may be discarded.|' \
      T2

    patch_trigger \
      'openclaw\.inbound_meta\.v1' \
      's/openclaw\.inbound_meta\.v1/openclaw-inbound-meta-v1/g' \
      T3

    if [ "$CHANGED" -eq 0 ]; then
      echo "NO_CHANGES"
    fi
    {% endraw %}
  args:
    executable: /bin/bash
  register: trigger_patch_result
  changed_when: "'NO_CHANGES' not in trigger_patch_result.stdout"
  failed_when: "'FAIL:' in trigger_patch_result.stdout"
  notify: restart openclaw-gateway
